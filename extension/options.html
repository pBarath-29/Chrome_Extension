<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ToS Clarity — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0d12;
      color: #c8d0dc;
      min-height: 100vh;
      padding: 40px 0;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: rgba(196, 154, 74, 0.26);
      border: 1px solid rgba(196, 154, 74, 0.45);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon span {
      font-size: 12px;
      font-weight: 600;
      color: #e8c070;
      letter-spacing: -0.5px;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f4f6fa;
      letter-spacing: -0.3px;
    }

    .header-text p {
      font-size: 12px;
      color: #8896a8;
      margin-top: 2px;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #f4f6fa;
      margin-bottom: 4px;
    }

    .card-desc {
      font-size: 11px;
      color: #8896a8;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8896a8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      color: #f4f6fa;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: rgba(196, 154, 74, 0.50);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s;
    }

    .btn-primary {
      background: rgba(196, 154, 74, 0.20);
      border-color: rgba(196, 154, 74, 0.40);
      color: #e8c070;
    }

    .btn-primary:hover { background: rgba(196, 154, 74, 0.30); }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.10);
      color: #8896a8;
    }

    .btn-secondary:hover { background: rgba(255,255,255,0.09); }

    #test-result {
      margin-top: 10px;
      font-size: 11px;
      line-height: 1.4;
      min-height: 16px;
    }

    #test-result.success { color: #6aab7e; }
    #test-result.error   { color: #c0635a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-icon"><span>TC</span></div>
      <div class="header-text">
        <h1>ToS Clarity Settings</h1>
        <p>Configure your backend connection</p>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Backend URL</div>
      <div class="card-desc">
        The local server that processes documents using Google Gemini.
        Default: <code style="font-size:10px;background:rgba(255,255,255,0.07);padding:1px 4px;border-radius:3px;color:#c8d0dc;">http://127.0.0.1:8000</code>
      </div>
      <label for="backend-url">Server URL</label>
      <input type="text" id="backend-url" placeholder="http://127.0.0.1:8000" />
      <div class="btn-row">
        <button class="btn btn-primary" id="save-btn">Save</button>
        <button class="btn btn-secondary" id="test-btn">Test Connection</button>
      </div>
      <div id="test-result"></div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
